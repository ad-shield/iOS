name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: xcodebuild test -scheme AdShield -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' -skipPackagePluginValidation
