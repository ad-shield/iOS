name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.0.7)'
        required: true

jobs:
  publish:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject version into source
        run: sed -i '' 's/sdkVersion = ".*"/sdkVersion = "${{ inputs.version }}"/' Sources/AdShield/EventLogger.swift

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sources/AdShield/EventLogger.swift
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main "v${{ inputs.version }}"

      - name: Build XCFramework
        run: ./scripts/build-xcframework.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          files: AdShield.xcframework.zip
          generate_release_notes: true
