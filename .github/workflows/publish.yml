name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.0.7)'
        required: true

jobs:
  publish:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must match vX.Y.Z (e.g. v0.0.7)"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Inject version into source
        run: |
          SEMVER="${{ inputs.version }}"
          SEMVER="${SEMVER#v}"
          sed -i '' "s/sdkVersion = \".*\"/sdkVersion = \"${SEMVER}\"/" Sources/AdShield/EventLogger.swift

      - name: Commit and tag
        run: |
          SEMVER="${{ inputs.version }}"
          SEMVER="${SEMVER#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sources/AdShield/EventLogger.swift
          git commit -m "chore: bump version to ${SEMVER}"
          git tag "${{ inputs.version }}"
          git push origin main "${{ inputs.version }}"

      - name: Build XCFramework
        run: ./scripts/build-xcframework.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.version }}"
          files: AdShield.xcframework.zip
          generate_release_notes: true
